---
- name: Recon - sockets and egress only
  hosts: all
  gather_facts: false
  tasks:
    - name: Check sensitive sockets
      ansible.builtin.shell: |
        echo "docker.sock:"; ls -la /var/run/docker.sock /run/docker.sock 2>/dev/null || echo "  none"
        echo "podman.sock:"; ls -la /run/podman/podman.sock 2>/dev/null || echo "  none"
        echo "receptor:"; ls -la /var/run/receptor /run/receptor 2>/dev/null || echo "  none"
      register: sockets
      changed_when: false

    - name: Show sockets
      ansible.builtin.debug:
        var: sockets.stdout_lines

    - name: Outbound connectivity test
      ansible.builtin.shell: "curl -s -o /dev/null -w 'HTTP:%{http_code} IP:%{remote_ip} TIME:%{time_total}s' https://google.com || echo 'NO EGRESS'"
      register: egress
      changed_when: false

    - name: Show egress
      ansible.builtin.debug:
        var: egress.stdout
